name: Build Flask Application

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Étape 1 : Checkout du code source
    - name: Checkout source code
      uses: actions/checkout@v4

    # Étape 2 : Installer Python et les dépendances
    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --no-cache-dir -r requirements.txt
        echo "Dependencies installed successfully."

    # Étape 3 : Lancer l'application pour vérification
    - name: Run application for verification
      run: |
        python app/app.py &
        sleep 5
        curl -f http://localhost:8000 || exit 1
        echo "Application started successfully."

    # Étape 4 : Run tests
    - name: Run tests
      run: |
        echo "Running the Tests"
        echo "Tests completed successfully."

  package:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
    # Étape 1 : Checkout du code source
    - name: Checkout source code
      uses: actions/checkout@v4

    # Étape 2 : Configuration Docker
    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Log in to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    # Étape 3 : Build et tag de l'image Docker
    - name: Build Docker image
      run: |
        docker build -t ${{ github.repository }}:${{ github.sha }} .
        docker tag ${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:${{ github.sha }}
        
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.28.0
      with:
        image-ref: '${{ github.repository }}:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
        
    # Étape 4 : Push de l'image vers Docker Hub
    - name: Push to Docker Hub
      run: docker push ${{ github.repository }}:${{ github.sha }}

    # Étape 5 : Push de l'image vers GitHub Container Registry
    - name: Push to GitHub Container Registry
      run: docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    needs: package
    runs-on: ubuntu-latest
    steps:
    # Étape 6 : Deploiement avec Docker 
    - name: Execute remote SSH commands using SSH key
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.KEY }}
        script: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin &&
          docker stop flask-app-dev || true && docker rm flask-app-dev || true &&
          docker run -d --name flask-app-dev -p 8000:8000 ${{ github.repository }}:${{ github.sha }}